name: Deploy Pages Repo

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'pages-repo/**'
      - 'scripts/build_pages_repo.py'
      - 'scripts/verify_pages_repo.py'
      - '.github/workflows/deploy-pages-repo.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false
      - name: Verify repo files are real artifacts
        run: python3 scripts/verify_pages_repo.py
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-repo
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
