name: Deploy Pages Repo

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'pages-repo/**'
      - '.github/workflows/deploy-pages-repo.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false
      - name: Verify repo files are real artifacts
        run: |
          set -euo pipefail
          test -f pages-repo/.nojekyll
          test -s pages-repo/index.html
          test -s pages-repo/Packages
          gzip -t pages-repo/Packages.gz
          if grep -R "git-lfs.github.com/spec" pages-repo; then
            echo "Git LFS pointer detected under pages-repo" >&2
            exit 1
          fi
          deb_count="$(find pages-repo/debs -maxdepth 1 -type f -name '*.deb' | wc -l | tr -d '[:space:]')"
          test "$deb_count" = "2"
          test "$(stat -c%s pages-repo/debs/com.amg456.rootless_18.1.1_nopopup_2099_noheartbeat_noexit.deb)" = "6206412"
          echo "0695c1eb4a3bc7e928c76bf22256d5298be784bf0aa854b2addaef924a8a2866  pages-repo/debs/com.amg456.rootless_18.1.1_nopopup_2099_noheartbeat_noexit.deb" | sha256sum -c -
          test "$(stat -c%s pages-repo/debs/app.Razer854.rootless_2.5.0_nopopup_noexpire_noheartbeat_noexit.deb)" = "21215306"
          echo "bffe9d57de415d70c6723e90e9aca0f2c17da123abd10e812243db3a1f8505ef  pages-repo/debs/app.Razer854.rootless_2.5.0_nopopup_noexpire_noheartbeat_noexit.deb" | sha256sum -c -
          gzip -dc pages-repo/Packages.gz | grep -q '^Package: com.amg456.rootless$'
          gzip -dc pages-repo/Packages.gz | grep -q '^Package: app.Razer854.rootless$'
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-repo
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
